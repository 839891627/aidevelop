spring:
  application:
    name: ai-chat-assistant

  # 多环境配置支持 - 默认使用 OpenAI
  profiles:
    active: openai

  # 数据库配置
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_develop}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none  # 不自动创建表，使用已有表结构
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # AI 通用配置
  ai:
    retry:
      max-attempts: 3
      backoff-delay: 1000
    # 智谱 AI 配置 (用于 RAG 向量化)
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY:}
      # 不需要设置 base-url，Spring AI 已有默认配置
      embedding:
        enabled: true

  # Knife4j 配置
  webflux:
    base-path: /
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  # Knife4j 增强配置
  show-actuator: false
  use-fqn: true

# Knife4j 配置
knife4j:
  enable: true
  production: false
  basic:
    enable: false
  # 增强功能配置
  documents:
    - name: 项目说明
      locations: classpath:knife4j/project.md
  # 左侧菜单配置
  settings:
    language: zh_CN
    enable-swagger-models: true
    enable-document-manage: true
    swagger-models-name: 数据模型
    enable-host-text: false
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: "© 2026 AI Chat Assistant | 智能对话助手系统"
    enable-dynamic-modify-parameter: true
    enable-debug: true
    enable-open-api: true
    enable-filter-multipart-apis: true
    enable-filter-multipart-api-method-type: POST

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example.aidevelop: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/aidevelop.log

# 应用自定义配置
app:
  chat:
    max-history-size: 10  # 最大历史消息数
    default-temperature: 0.7
    default-max-tokens: 1000
    # RAG 检索配置
    rag:
      similarity-threshold: 0.2  # 相似度阈值 (0.0-1.0)，ZhipuAI 建议设为 0.2 以匹配大段文本
      top-k: 5                   # 检索返回的文档数量
      # RAG 管道配置（组合使用多种技巧）
      pipeline:
        enable-query-rewrite: true      # 启用查询重写
        enable-query-expansion: true    # 启用查询扩展
        enable-hybrid-search: false     # 启用混合检索（默认关闭，速度慢）
        enable-rerank: true            # 启用重排序（默认关闭，速度慢）
        auto-mode: true                 # 自动模式：根据查询特点选择最佳策略
        complex-query-length: 10        # 复杂查询长度阈值
        question-words:                 # 问题词列表（包含这些词启用重排序）
          - 怎么办
          - 如何
          - 怎么
          - 为什么
          - 是什么
          - 哪些
          - 如何处理

  # 提示词管理配置
  prompts:
    enabled: true
    base-path: classpath:prompts/
    system-prompt: system/default.txt
    rag-qa-prompt: rag/qa.txt
    function-calling-prompt: function/calling.txt

  # 成本追踪配置
  cost-tracking:
    enabled: true
    log-all-calls: true  # 是否记录所有AI调用

  # 缓存配置
  cache:
    enabled: true  # 是否启用缓存
    ai-response:
      max-size: 1000  # AI响应缓存最大条数
      ttl: 30  # 过期时间（分钟）
    vector-search:
      max-size: 500  # 向量检索缓存最大条数
      ttl: 60  # 过期时间（分钟）
    function-call:
      max-size: 2000  # 函数调用缓存最大条数
      ttl: 10  # 过期时间（分钟）

