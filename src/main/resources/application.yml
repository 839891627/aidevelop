spring:
  application:
    name: ai-chat-assistant
  profiles:
    active: openai
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  ai:
    retry:
      max-attempts: 3
      backoff-delay: 1000
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      chat:
        enabled: false
      embedding:
        enabled: true
        model: ${EMBEDDING_MODEL}
        options:
          model: ${EMBEDDING_MODEL}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false
  use-fqn: true

knife4j:
  enable: true
  production: false
  basic:
    enable: false
  documents:
    - name: 项目说明
      locations: classpath:knife4j/project.md
  settings:
    language: zh_CN
    enable-swagger-models: true
    enable-document-manage: true
    swagger-models-name: 数据模型
    enable-host-text: false
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: "© 2026 AI Chat Assistant | 智能对话助手系统"
    enable-dynamic-modify-parameter: true
    enable-debug: true
    enable-open-api: true
    enable-filter-multipart-apis: true
    enable-filter-multipart-api-method-type: POST

server:
  port: 8080

vector:
  store:
    # 切换 embedding 模型后，请使用新的向量库文件路径（避免向量维度不一致）
    path: ${VECTOR_STORE_PATH}

logging:
  level:
    root: INFO
    com.example.aidevelop: DEBUG
    org.springframework.ai: DEBUG
    # LLM 交互链路日志（Spring AI -> OpenAI API -> HTTP Client）
    org.springframework.ai.chat.client: DEBUG
    org.springframework.ai.openai: DEBUG
    org.springframework.web.reactive.function.client.ExchangeFunctions: TRACE
    reactor.netty.http.client: DEBUG
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/aidevelop.log
app:
  ai:
    pricing:
      chat-input: 0.001
      chat-output: 0.002
      embedding-input: 0.0
  chat:
    max-history-size: 10
    default-temperature: 0.7
    default-max-tokens: 1000
    rag:
      # false: 纯聊天模式，不走向量检索；true: 启用 RAG（会调用 embedding）
      enabled: true
      similarity-threshold: 0.2
      top-k: 5
      chunking:
        chunk-size: 500
        min-chunk-size-chars: 200
        min-chunk-length-to-embed: 10
        max-num-chunks: 10000
        keep-separator: true
      pipeline:
        enable-query-rewrite: true
        enable-query-expansion: true
        enable-hybrid-search: false
        enable-rerank: true
        auto-mode: true
        complex-query-length: 10
        question-words:
          - 怎么办
          - 如何
          - 怎么
          - 为什么
          - 是什么
          - 哪些
          - 如何处理
    routing:
      business-id-pattern: "(LOAN\\d+|REPAY\\d+|CUST\\d+|ORDER\\d+)"
      tool-intent-keywords:
        - 查询订单
        - 订单
        - 借款记录
        - 还款记录
        - 风险评估
        - 用户编号
      rag-intent-keywords:
        - 规则
        - 政策
        - 产品手册
        - 利率
        - 额度
        - 期限
        - 申请条件
        - 流程
      tool-only-tool-names:
        - loanQueryFunction
        - repaymentQueryFunction
        - riskAssessmentFunction
      hybrid-tool-names:
        - loanQueryFunction
        - repaymentQueryFunction
        - riskAssessmentFunction
      rag-only-top-k: 5
      rag-only-similarity-threshold: 0.2
      hybrid-top-k: 3
      hybrid-similarity-threshold: 0.25
      max-tool-calls: 3
      timeout-ms: 30000
  prompts:
    enabled: true
    registry-enabled: true
    env: dev
  tools:
    enabled:
      - loanQueryFunction
      - repaymentQueryFunction
      - riskAssessmentFunction
  cost-tracking:
    enabled: true
    log-all-calls: true
