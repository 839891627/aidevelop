<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成本管理 - AI 智能助手</title>
    <link rel="stylesheet" href="/css/cost.css">
</head>
<body>
    <div class="cost-container">
        <header class="cost-header">
            <div class="header-content">
                <h1>💰 成本管理</h1>
                <p class="subtitle">AI 调用成本统计与分析</p>
            </div>
            <a href="/index.html" class="back-btn">← 返回聊天</a>
        </header>

        <main class="cost-main">
            <!-- 时间段选择 -->
            <div class="time-selector">
                <button class="time-btn active" data-period="today">今日</button>
                <button class="time-btn" data-period="week">本周</button>
                <button class="time-btn" data-period="month">本月</button>
                <button class="time-btn" data-period="custom">自定义</button>
            </div>

            <!-- 自定义日期范围（隐藏） -->
            <div class="custom-range" style="display: none;">
                <input type="datetime-local" id="startDate" placeholder="开始时间">
                <input type="datetime-local" id="endDate" placeholder="结束时间">
                <button id="queryBtn">查询</button>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-content">
                        <div class="stat-label">总调用次数</div>
                        <div class="stat-value" id="totalCalls">-</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">💵</div>
                    <div class="stat-content">
                        <div class="stat-label">总成本</div>
                        <div class="stat-value" id="totalCost">-</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <div class="stat-label">成功 / 总调用</div>
                        <div class="stat-value" id="inputTokens">-</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-content">
                        <div class="stat-label">成功率</div>
                        <div class="stat-value" id="outputTokens">-</div>
                    </div>
                </div>
            </div>

            <!-- 详细统计表格 -->
            <div class="details-section">
                <h2>每日成本趋势</h2>
                <div class="table-wrapper">
                    <table class="details-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>模型</th>
                                <th>Token</th>
                                <th>耗时</th>
                                <th>成本</th>
                                <th>调用次数</th>
                            </tr>
                        </thead>
                        <tbody id="detailsBody">
                            <tr class="loading">
                                <td colspan="6">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 模型分布 -->
            <div class="model-distribution">
                <h2>模型分布</h2>
                <div id="modelStats" class="model-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/cost.js"></script>
</body>
</html>
