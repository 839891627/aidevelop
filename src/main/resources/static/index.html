<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手</title>
    <link rel="stylesheet" href="/css/chat.css">
    <!-- Markdown解析库 - 必须在chat.js之前加载 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <base target="_blank">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>AI 智能助手</h1>
            <div class="controls">
                <button id="clearBtn"><span>清空对话</span></button>
                <select id="modeSelect">
                    <option value="normal">普通模式</option>
                    <option value="stream" selected>流式模式</option>
                </select>
            </div>
        </header>

        <main id="chatMessages" class="chat-messages">
            <div class="empty-state">
                <div class="empty-state-icon">✦</div>
                <div class="empty-state-text">
                    <strong>开始新的对话</strong><br>
                    输入您的问题，我将竭诚为您服务
                </div>
            </div>
        </main>

        <footer class="chat-input">
            <textarea id="messageInput" placeholder="输入消息..." rows="3"></textarea>
            <button id="sendBtn">发送</button>
        </footer>
    </div>

    <script src="/js/chat.js"></script>
</body>
</html>
