spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL}
      embedding:
        enabled: false
      image:
        enabled: false
      audio:
        speech:
          enabled: false
        transcription:
          enabled: false
      chat:
        enabled: true
        options:
          model: ${OPENAI_CHAT_MODEL:deepseek-chat}
          temperature: 0.7
          max-tokens: 1000
